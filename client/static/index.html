<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Multiplayer - WebSocket</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background:
                radial-gradient(circle at top, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at right, rgba(16, 185, 129, 0.12), transparent 18%),
                linear-gradient(180deg, #0f172a 0%, #020617 100%);
        }

        .quiz-card {
            backdrop-filter: blur(18px);
            background-color: rgba(15, 23, 42, 0.9);
        }

        #roomLink a {
            color: #a5b4fc;
            word-break: break-all;
        }

        /* Feedback estilo Kahoot */
        .option-btn.correct {
            background-color: #22c55e !important;
            color: white;
            transform: scale(1.05);
        }

        .option-btn.wrong {
            background-color: #ef4444 !important;
            color: white;
        }

        .option-btn {
            transition: all 0.2s ease;
        }

        .option-btn.selected {
            filter: brightness(1.2);
            transform: scale(0.97);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.2) inset;
        }

        .option-btn:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        /* Status com cores de vencedor */
        #status.winner-azul {
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.7), rgba(12, 74, 110, 0.7));
            border-color: rgba(96, 165, 250, 0.6);
            color: #7dd3fc;
        }

        #status.winner-vermelho {
            background: linear-gradient(135deg, rgba(127, 29, 29, 0.7), rgba(110, 7, 47, 0.7));
            border-color: rgba(248, 113, 113, 0.6);
            color: #fca5a5;
        }

        #status.empate {
            background: linear-gradient(135deg, rgba(51, 65, 85, 0.7), rgba(30, 41, 59, 0.7));
            border-color: rgba(148, 163, 184, 0.6);
            color: #cbd5e1;
        }
    </style>

</head>


<body class="min-h-screen flex items-center justify-center px-4 py-10 text-slate-100">

<div class="quiz-card max-w-3xl w-full rounded-3xl border border-slate-700/60 p-5 shadow-[0_30px_80px_rgba(15,23,42,0.45)]">

    <!-- HEADER -->
    <div class="flex items-center justify-between gap-4 mb-4">
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Quiz Multiplayer</h1>
            <p class="text-sm text-slate-400 mt-1">Vamos testar seu conhecimento em Python?</p>
        </div>

        <div class="rounded-full bg-slate-800/90 px-3 py-1 text-xs uppercase tracking-[0.2em] text-slate-300">
            WebSocket
        </div>
    </div>

    <!-- STATUS -->
    <div id="status"
        class="mb-3 rounded-2xl border border-slate-700/70 bg-slate-900/80 px-4 py-2 text-center text-base font-semibold shadow-inner transition-all duration-300">
        Crie uma sala para iniciar o quiz
    </div>

    <!-- TIMER BAR -->
    <div class="w-full bg-slate-800 rounded-full h-3 mb-4 overflow-hidden">
        <div id="timerBar"
            class="bg-indigo-500 h-3 rounded-full transition-all duration-1000"
            style="width: 100%">
        </div>
    </div>

    <!-- RODADA COUNTER -->
    <div id="questionMeta" class="mb-3 text-right text-sm font-bold text-yellow-400 tracking-wide">Rodada 0</div>

    <!-- INFO -->
    <div class="grid grid-cols-1 mb-4">

        <div class="rounded-2xl border border-purple-500/50 bg-gradient-to-br from-purple-900/40 to-slate-900/60 p-4">
            <h2 class="text-xs uppercase tracking-wider text-purple-300 font-bold mb-3">🏆 Placar</h2>
            <div id="scoreboard" class="grid grid-cols-2 gap-2">
                <div class="flex items-center justify-between bg-blue-900/50 rounded-xl px-2 py-1 border border-blue-500/40">
                    <span class="text-xs text-blue-100 font-semibold">👤 Jogador 1</span>
                    <span class="text-lg font-bold text-blue-400">0</span>
                </div>
                <div class="flex items-center justify-between bg-red-900/50 rounded-xl px-2 py-1 border border-red-500/40">
                    <span class="text-xs text-red-100 font-semibold">👤 Jogador 2</span>
                    <span class="text-lg font-bold text-red-400">0</span>
                </div>
            </div>
        </div>

    </div>

    <!-- QUIZ -->
    <div id="quizArea" class="mb-4 hidden">

        <!-- PERGUNTA -->
        <div class="rounded-2xl border border-slate-700/70 bg-slate-900/80 p-6 mb-5 text-center">
            <p id="questionText" class="text-xl font-bold leading-relaxed">
                Pergunta aparecerá aqui
            </p>
        </div>

        <!-- OPÇÕES -->
        <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- opções geradas via JS -->
        </div>

    </div>

    <!-- BOTÃO -->
    <button id="createRoom"
        class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold px-5 py-3 rounded-2xl shadow-lg shadow-indigo-500/20 transition transform hover:scale-[1.02]">
        Criar sala
    </button>

    <!-- LINK -->
    <div id="roomLink" class="mt-4 text-sm text-slate-300 text-center hidden"></div>

</div>

<script type="module" src="main.js"></script>
</body>
</html>
